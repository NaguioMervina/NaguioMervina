name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update overview metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NaguioMervina
          filename: metrics.svg
          committer_message: "chore: update ${filename}"
          template: classic
          base: header, activity, community, repositories, metadata
          config_order: base.header, base.repositories, base.activity+community, isocalendar
          output_condition: skip-if-only-metadata-changed
          config_timezone: Asia/Manila
          plugin_isocalendar: yes

      - name: Update most used languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NaguioMervina
          filename: metrics.languages.svg
          committer_message: "chore: update ${filename}"
          template: classic
          base: ""
          output_condition: skip-if-only-metadata-changed
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          plugin_languages_threshold: 2%
          plugin_languages_other: yes
          plugin_languages_colors: rainbow
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot, vba, tsql, scss, gherkin, vim, vim script, handlebars, xslt
